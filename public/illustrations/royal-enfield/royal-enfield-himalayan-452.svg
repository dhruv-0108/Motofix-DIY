<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <defs>
    <pattern id="grid-himalayan" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
    </pattern>
    <g id="spokes-himalayan">
      <line x1="0" y1="0" x2="115" y2="15" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="115" y2="-15" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-115" y2="15" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-115" y2="-15" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="15" y2="115" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-15" y2="115" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="15" y2="-115" stroke="#555" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-15" y2="-115" stroke="#555" stroke-width="0.75" />
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#0D0D0D" />
  <rect width="100%" height="100%" fill="url(#grid-himalayan)" opacity="0.3" />

  <!-- Technical border frame -->
  <rect x="20" y="20" width="1160" height="660" fill="none" stroke="#333" stroke-width="1" />
  <text x="50" y="60" fill="#666" font-family="monospace" font-size="14" font-weight="bold">ROYAL ENFIELD HIMALAYAN 452 | ADVENTURE BLUEPRINT</text>

  <!-- Adventure Silhouette -->
  <g fill="none" stroke="#F0EDE8" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- High Clearance Spoked Wheels (21" Front, 17" Rear) -->
    <g id="adv-wheels">
      <!-- Tall 21" Front Wheel -->
      <circle cx="240" cy="510" r="130" stroke="#333" stroke-width="10" />
      <circle cx="240" cy="510" r="120" stroke="#F0EDE8" stroke-width="2" />
      <circle cx="240" cy="510" r="22" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" />
      <g transform="translate(240, 510)"><use href="#spokes-himalayan" /><use href="#spokes-himalayan" transform="rotate(30)" /></g>
      <!-- Beak fender -->
      <path d="M 230 380 Q 210 385, 120 405 L 140 370 Q 230 360, 260 380" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <path d="M 170 500 C 170 440, 240 430, 270 440" stroke="#555" stroke-width="1.5" /> <!-- Lower hugger fender -->

      <!-- Heavy 17" Rear Wheel -->
      <circle cx="950" cy="530" r="110" stroke="#333" stroke-width="14" />
      <circle cx="950" cy="530" r="98" stroke="#F0EDE8" stroke-width="2" />
      <circle cx="950" cy="530" r="26" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" />
      <g transform="translate(950, 530)"><use href="#spokes-himalayan" /><use href="#spokes-himalayan" transform="rotate(30)" /></g>
    </g>

    <!-- Tall Front Suspension & Handlebars & Screen -->
    <g id="adv-front">
      <!-- Upside Down (USD) Forks -->
      <line x1="240" y1="510" x2="350" y2="180" stroke="#F0EDE8" stroke-width="6.5" />
      <rect x="300" y="200" width="16" height="150" transform="rotate(-71.5, 300, 200)" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" />
      
      <!-- Windshield Screen -->
      <path d="M 330 190 Q 290 140, 280 110 L 305 105 Q 315 135, 345 180 Z" fill="#1A1A1A" stroke="#666" stroke-width="1.5" opacity="0.6" />
      
      <!-- Handlebars tall riser -->
      <path d="M 350 180 L 370 140 L 400 145" stroke="#F0EDE8" stroke-width="3" />
      <rect x="365" y="136" width="12" height="6" fill="#F0EDE8" />
    </g>

    <!-- Sherpa 450 Liquid Cooled Engine Block -->
    <g id="adv-engine">
      <!-- Modern square DOHC engine shape -->
      <rect x="490" y="375" width="105" height="115" rx="4" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <rect x="475" y="360" width="125" height="30" rx="8" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" /> <!-- Cylinder Head -->
      <!-- Vertical Radiator guard panel -->
      <rect x="430" y="320" width="18" height="100" fill="#1A1A1A" stroke="#666" stroke-width="1.5" />
      <line x1="439" y1="325" x2="439" y2="415" stroke="#F0EDE8" stroke-width="1" stroke-dasharray="3,3" />

      <!-- Crankcase cover modern design -->
      <circle cx="560" cy="495" r="46" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <line x1="560" y1="465" x2="560" y2="525" stroke="#555" stroke-width="1" />
      
      <!-- Upswept aggressive adventure exhaust muffler -->
      <path d="M 580 430 Q 640 430, 650 510 T 780 525 L 1020 460" stroke="#F0EDE8" stroke-width="4.5" />
      <path d="M 850 500 L 1010 462 L 1014 478 L 854 516 Z" fill="#1A1A1A" stroke="#F5A623" stroke-width="2" /> <!-- Silencer Shield -->
    </g>

    <!-- Adventure Body, Racks & Split Steep Seats -->
    <g id="adv-body">
      <!-- Large Adventure Fuel Tank with metal external skeleton racks -->
      <path d="M 355 190 C 400 170, 540 170, 660 300 Q 560 340, 370 290 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="3" />
      <!-- External Tank Luggage Rack (Signature Himalayan feature) -->
      <path d="M 360 195 L 390 270 L 460 295 L 430 200 Z" stroke="#F5A623" stroke-width="2" />
      <line x1="390" y1="270" x2="430" y2="200" stroke="#F5A623" stroke-width="1.5" />
      
      <!-- Steeply Stepped Dual Seats -->
      <path d="M 660 300 C 690 275, 755 275, 775 350 C 800 330, 850 330, 890 350 L 900 390 Q 770 400, 660 300 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2.5" />
      
      <!-- Rear luggage carrier rack -->
      <path d="M 890 350 L 980 340 L 980 360 L 900 375 Z" fill="#1A1A1A" stroke="#F5A623" stroke-width="2" />

      <!-- Minimal side panel -->
      <rect x="710" y="360" width="70" height="45" rx="10" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      
      <!-- Rear high swingarm and shock -->
      <line x1="560" y1="495" x2="950" y2="530" stroke="#F0EDE8" stroke-width="5.5" />
      <line x1="780" y1="330" x2="840" y2="480" stroke="#F0EDE8" stroke-width="3.5" /> <!-- Monoshock placement -->
      
      <!-- Minimal rear tail mudguard extension -->
      <path d="M 885 365 C 935 370, 975 410, 985 460" stroke="#F0EDE8" stroke-width="3" />
    </g>

  </g>
</svg>
