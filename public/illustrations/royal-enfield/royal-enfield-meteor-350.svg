<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <defs>
    <pattern id="grid-meteor" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0D0D0D" />
  <rect width="100%" height="100%" fill="url(#grid-meteor)" opacity="0.3" />

  <!-- Annotation border -->
  <rect x="20" y="20" width="1160" height="660" fill="none" stroke="#333" stroke-width="1" />
  <text x="50" y="60" fill="#666" font-family="monospace" font-size="14" font-weight="bold">ROYAL ENFIELD METEOR 350 | CRUISER BLUEPRINT</text>

  <!-- Cruiser Styling Line Art -->
  <g fill="none" stroke="#F0EDE8" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Alloy Wheels (Cruiser Look) -->
    <g id="cruiser-wheels">
      <!-- Front Wheel 19" -->
      <circle cx="230" cy="530" r="115" stroke="#444" stroke-width="12" />
      <circle cx="230" cy="530" r="105" stroke="#F0EDE8" stroke-width="2" />
      <circle cx="230" cy="530" r="22" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" />
      <!-- Thick Alloy Spokes -->
      <g transform="translate(230, 530)" stroke="#555" stroke-width="4">
        <line x1="0" y1="0" x2="105" y2="0" />
        <line x1="0" y1="0" x2="-105" y2="0" />
        <line x1="0" y1="0" x2="0" y2="105" />
        <line x1="0" y1="0" x2="0" y2="-105" />
        <line x1="0" y1="0" x2="74" y2="74" />
        <line x1="0" y1="0" x2="-74" y2="-74" />
        <line x1="0" y1="0" x2="-74" y2="74" />
        <line x1="0" y1="0" x2="74" y2="-74" />
      </g>

      <!-- Rear Wheel 17" (Lower and wider) -->
      <circle cx="950" cy="540" r="105" stroke="#444" stroke-width="15" />
      <circle cx="950" cy="540" r="95" stroke="#F0EDE8" stroke-width="2" />
      <circle cx="950" cy="540" r="26" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" />
      <g transform="translate(950, 540)" stroke="#555" stroke-width="4">
        <line x1="0" y1="0" x2="95" y2="0" />
        <line x1="0" y1="0" x2="-95" y2="0" />
        <line x1="0" y1="0" x2="0" y2="95" />
        <line x1="0" y1="0" x2="0" y2="-95" />
        <line x1="0" y1="0" x2="67" y2="67" />
        <line x1="0" y1="0" x2="-67" y2="-67" />
        <line x1="0" y1="0" x2="-67" y2="67" />
        <line x1="0" y1="0" x2="67" y2="-67" />
      </g>
    </g>

    <!-- Cruiser Low-Slung Frame, Engine and exhaust -->
    <g id="cruiser-core">
      <!-- Low seat height frame line -->
      <path d="M 370 240 Q 480 320, 640 400 T 800 450" stroke="#F0EDE8" stroke-width="5" />
      <!-- Fork angle is much wider (raked out) -->
      <line x1="230" y1="530" x2="370" y2="230" stroke="#F0EDE8" stroke-width="6" />
      
      <!-- Handlebars are higher and swept back -->
      <path d="M 370 230 L 400 160 L 430 180" stroke="#F0EDE8" stroke-width="3" />
      <circle cx="435" cy="183" r="6" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1" />

      <!-- Modern J-series engine casing -->
      <rect x="490" y="390" width="105" height="100" rx="12" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <!-- Fin lines -->
      <line x1="480" y1="410" x2="600" y2="410" stroke="#F0EDE8" stroke-width="2" />
      <line x1="480" y1="425" x2="600" y2="425" stroke="#F0EDE8" stroke-width="2" />
      <line x1="485" y1="440" x2="595" y2="440" stroke="#F0EDE8" stroke-width="2" />
      <!-- Rounded crankcase side cover -->
      <circle cx="560" cy="500" r="48" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      
      <!-- Upswept premium muffler -->
      <path d="M 570 450 Q 640 450, 650 520 T 780 545 L 1020 525" stroke="#F0EDE8" stroke-width="4.5" />
    </g>

    <!-- Tank & Stepped Cruiser Seats -->
    <g id="cruiser-body">
      <!-- Curved Teardrop cruiser fuel tank -->
      <path d="M 370 230 C 430 200, 580 200, 680 340 Q 560 360, 395 300 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="3" />
      
      <!-- Strongly Stepped Dual Seats -->
      <path d="M 680 340 C 700 320, 740 320, 770 375 C 790 360, 830 355, 860 385 L 870 420 Q 770 425, 680 340 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2.5" />
      
      <!-- Tri-angular Side Panel -->
      <path d="M 690 395 L 755 395 L 740 455 L 685 435 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      
      <!-- Front & Rear Mudguards -->
      <path d="M 125 500 C 130 460, 185 430, 260 445" stroke="#F0EDE8" stroke-width="2.5" />
      <path d="M 855 385 C 925 390, 990 440, 1010 520" stroke="#F0EDE8" stroke-width="3.5" />
    </g>

  </g>
</svg>
