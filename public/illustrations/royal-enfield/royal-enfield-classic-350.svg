<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <!-- Definitions for reusable components -->
  <defs>
    <!-- Grid overlay pattern for a blueprint look -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
    </pattern>
    <!-- Technical spoke pattern for motorcycle wheels -->
    <g id="spokes">
      <line x1="0" y1="0" x2="115" y2="30" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="115" y2="-30" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-115" y2="30" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-115" y2="-30" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="30" y2="115" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-30" y2="115" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="30" y2="-115" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-30" y2="-115" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="80" y2="80" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-80" y2="80" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="80" y2="-80" stroke="#666" stroke-width="0.75" />
      <line x1="0" y1="0" x2="-80" y2="-80" stroke="#666" stroke-width="0.75" />
    </g>
  </defs>

  <!-- Background grid for drafting effect -->
  <rect width="100%" height="100%" fill="#0D0D0D" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.4" />

  <!-- Alignment lines and technical labels -->
  <g stroke="#333" stroke-width="0.5" stroke-dasharray="5,5">
    <line x1="100" y1="520" x2="1100" y2="520" /> <!-- Ground Line -->
    <line x1="250" y1="200" x2="250" y2="600" /> <!-- Front Wheel Center Axis -->
    <line x1="950" y1="200" x2="950" y2="600" /> <!-- Rear Wheel Center Axis -->
    <line x1="600" y1="100" x2="600" y2="600" /> <!-- Engine Midline Axis -->
  </g>

  <!-- Motorcycle Line Art Container -->
  <g fill="none" stroke="#F0EDE8" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- FRONT WHEEL & BRAKES (x: ~250, y: ~520) -->
    <g id="front-wheel-assembly">
      <!-- Tyre Outer & Inner Rim -->
      <circle cx="250" cy="520" r="120" stroke="#555" stroke-width="12" />
      <circle cx="250" cy="520" r="108" stroke="#F0EDE8" stroke-width="2.5" />
      <circle cx="250" cy="520" r="92" stroke="#666" stroke-width="1.5" />
      <!-- Wheel Hub -->
      <circle cx="250" cy="520" r="28" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <!-- Spokes -->
      <g transform="translate(250, 520)">
        <use href="#spokes" />
        <use href="#spokes" transform="rotate(15)" />
      </g>
      <!-- Front Brake Disc & Caliper -->
      <circle cx="250" cy="520" r="62" stroke="#F0EDE8" stroke-width="1.5" stroke-dasharray="10, 3" />
      <path d="M 170 560 C 170 575, 190 595, 200 580 C 190 560, 180 550, 170 560 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" /> <!-- Caliper -->
      <!-- Brake pad detail -->
      <line x1="175" y1="585" x2="185" y2="595" stroke="#F5A623" stroke-width="3" />
    </g>

    <!-- FRONT SUSPENSION & HANDLEBARS (x: ~320, y: ~380) -->
    <g id="front-forks">
      <!-- Mudguard Front -->
      <path d="M 130 520 C 130 450, 200 400, 310 420" stroke="#F0EDE8" stroke-width="4" fill="none" />
      <!-- Telescopic Forks -->
      <line x1="250" y1="520" x2="380" y2="220" stroke="#F0EDE8" stroke-width="5" />
      <line x1="255" y1="520" x2="385" y2="220" stroke="#555" stroke-width="2" />
      <!-- Fork boots/sleeves -->
      <rect x="290" y="380" width="16" height="60" transform="rotate(-66.5, 290, 380)" fill="#0D0D0D" stroke="#F0EDE8" stroke-width="1.5" />
      <!-- Triple clamp -->
      <rect x="362" y="240" width="22" height="12" transform="rotate(-66.5, 362, 240)" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <rect x="372" y="215" width="22" height="12" transform="rotate(-66.5, 372, 215)" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <!-- Handlebars -->
      <path d="M 380 220 L 400 180 L 385 175" stroke="#F0EDE8" stroke-width="3.5" />
      <path d="M 400 180 L 420 185" stroke="#666" stroke-width="4" /> <!-- Grip -->
      <circle cx="390" cy="210" r="7" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" /> <!-- Brake reservoir -->
    </g>

    <!-- REAR WHEEL & DRIVETRAIN (x: ~950, y: ~520) -->
    <g id="rear-wheel-assembly">
      <!-- Tyre Outer & Inner Rim -->
      <circle cx="950" cy="520" r="120" stroke="#555" stroke-width="14" />
      <circle cx="950" cy="520" r="105" stroke="#F0EDE8" stroke-width="2.5" />
      <circle cx="950" cy="520" r="90" stroke="#666" stroke-width="1.5" />
      <!-- Hub & Sprocket -->
      <circle cx="950" cy="520" r="32" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <circle cx="950" cy="520" r="54" stroke="#F0EDE8" stroke-width="1.5" stroke-dasharray="4, 2" /> <!-- Sprocket teeth outline -->
      <!-- Spokes -->
      <g transform="translate(950, 520)">
        <use href="#spokes" />
        <use href="#spokes" transform="rotate(15)" />
      </g>
      <!-- Chain Adjuster -->
      <rect x="942" y="512" width="25" height="16" rx="2" fill="#1A1A1A" stroke="#F5A623" stroke-width="2" />
      <circle cx="950" cy="520" r="6" fill="#F5A623" />
      <!-- Rear Brake Disc & Caliper -->
      <circle cx="950" cy="520" r="58" stroke="#666" stroke-width="1.2" />
      <path d="M 890 550 C 890 562, 912 584, 922 570 C 910 550, 900 540, 890 550 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" /> <!-- Caliper -->
    </g>

    <!-- MAIN FRAME & ENGINE CASTING (x: ~580, y: ~480) -->
    <g id="frame-and-engine">
      <!-- Frame Main Tube -->
      <path d="M 380 230 Q 500 240, 680 340 T 780 430" stroke="#F0EDE8" stroke-width="6" />
      <path d="M 375 255 Q 480 350, 520 480" stroke="#555" stroke-width="4" /> <!-- Down tube -->
      
      <!-- Engine Cylinder Block & Head -->
      <rect x="500" y="380" width="90" height="90" rx="10" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <!-- Cooling Fins -->
      <line x1="490" y1="395" x2="600" y2="395" stroke="#F0EDE8" stroke-width="2" />
      <line x1="485" y1="410" x2="605" y2="410" stroke="#F0EDE8" stroke-width="2" />
      <line x1="485" y1="425" x2="605" y2="425" stroke="#F0EDE8" stroke-width="2" />
      <line x1="490" y1="440" x2="600" y2="440" stroke="#F0EDE8" stroke-width="2" />
      <!-- Tappet Cover -->
      <path d="M 515 379 L 525 365 L 565 365 L 575 379 Z" fill="#0D0D0D" stroke="#F0EDE8" stroke-width="2" />
      
      <!-- Crankcase cover (Right Side Clutch Cover) -->
      <circle cx="580" cy="490" r="55" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <rect x="520" y="475" width="110" height="60" rx="20" fill="none" stroke="#F0EDE8" stroke-width="1.5" />
      <!-- Oil Filler Cap -->
      <circle cx="560" cy="450" r="7" fill="#0D0D0D" stroke="#F0EDE8" stroke-width="1.5" />
      <line x1="556" y1="450" x2="564" y2="450" stroke="#F5A623" stroke-width="2" />
      
      <!-- Spark Plug -->
      <line x1="540" y1="365" x2="540" y2="350" stroke="#F0EDE8" stroke-width="2" />
      <rect x="536" y="344" width="8" height="8" fill="#F0EDE8" />
      <path d="M 540 344 Q 530 330, 520 350" stroke="#666" stroke-width="3" /> <!-- Spark plug HT cable -->
    </g>

    <!-- FUEL TANK, SEATS & BODY PANELS (x: ~600, y: ~380) -->
    <g id="body-aesthetic-parts">
      <!-- Fuel Tank Classic teardrop design -->
      <path d="M 390 230 C 430 210, 560 210, 680 320 C 650 350, 550 360, 420 300 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="3" />
      <path d="M 450 250 C 480 240, 530 240, 580 300 C 510 320, 480 300, 450 250 Z" stroke="#555" stroke-dasharray="2,2" /> <!-- Tank Pad/Sticker area -->
      <!-- Fuel Cap -->
      <ellipse cx="600" cy="225" rx="12" ry="4" fill="#1A1A1A" stroke="#F5A623" stroke-width="2" />

      <!-- Split Seat: Rider -->
      <path d="M 680 320 C 700 310, 750 310, 780 370 C 740 375, 700 360, 680 320 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2.5" />
      <circle cx="715" cy="365" r="5" fill="#666" /> <!-- Seat spring -->
      
      <!-- Split Seat: Pillion -->
      <path d="M 790 355 C 810 345, 870 345, 890 390 C 850 395, 810 395, 790 355 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      
      <!-- Oval Side Panel (Battery box cover) -->
      <rect x="700" y="390" width="85" height="65" rx="28" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2.5" />
      <circle cx="750" cy="422" r="5" fill="#0D0D0D" stroke="#F0EDE8" stroke-width="1.5" /> <!-- Lock cylinder -->
      
      <!-- Air Filter Box Cover / Utility Box Right -->
      <path d="M 640 390 L 690 390 L 690 450 L 630 430 Z" fill="#1A1A1A" stroke="#555" stroke-width="1.5" />
    </g>

    <!-- EXHAUST, SWINGARM & SUSPENSION (x: ~800, y: ~580) -->
    <g id="exhaust-and-swingarm">
      <!-- Exhaust Header pipe -->
      <path d="M 580 430 Q 640 430, 650 510 T 800 540 L 1050 540" stroke="#F0EDE8" stroke-width="4.5" />
      <path d="M 850 534 L 1045 534 L 1045 546 L 850 546 Z" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" /> <!-- Silencer Muffler -->
      
      <!-- Swingarm -->
      <line x1="580" y1="490" x2="950" y2="520" stroke="#F0EDE8" stroke-width="5" />
      
      <!-- Rear Shock Absorber -->
      <line x1="820" y1="365" x2="820" y2="515" stroke="#F0EDE8" stroke-width="3" />
      <!-- Coil Spring coils -->
      <path d="M 810 390 Q 830 395, 810 400 Q 830 405, 810 410 Q 830 415, 810 420 Q 830 425, 810 430 Q 830 435, 810 440 Q 830 445, 810 450 Q 830 455, 810 460" stroke="#F0EDE8" stroke-width="2" />
    </g>

    <!-- TAIL SECTION & MUDGUARD (x: ~980, y: ~420) -->
    <g id="tail-section">
      <!-- Rear Valanced Mudguard -->
      <path d="M 770 370 C 850 370, 960 410, 990 510" stroke="#F0EDE8" stroke-width="4.5" fill="none" />
      
      <!-- Tail Light round capsule -->
      <rect x="990" y="440" width="16" height="24" rx="4" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="1.5" transform="rotate(15, 990, 440)" />
      <circle cx="1002" cy="452" r="5" fill="#A00" stroke="#F0EDE8" stroke-width="1" />
    </g>

    <!-- HEADLIGHT & INDICATORS (x: ~250, y: ~240) -->
    <g id="headlight-assembly">
      <!-- Round Headlight casing -->
      <path d="M 330 220 C 310 220, 270 230, 270 255 C 270 280, 310 290, 330 290" fill="#1A1A1A" stroke="#F0EDE8" stroke-width="2" />
      <line x1="270" y1="235" x2="270" y2="275" stroke="#F0EDE8" stroke-width="2.5" /> <!-- Lens cover vertical -->
      <circle cx="300" cy="245" r="4" fill="#F5A623" /> <!-- Tiger Eye pilot light -->
    </g>

  </g>
</svg>
